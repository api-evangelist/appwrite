naftiko: 1.0.0-alpha2
info:
  label: Appwrite API — Users
  description: 'Appwrite API — Users. 2 operations. Lead operation: Appwrite - List Users. Self-contained Naftiko capability
    covering one Appwrite business surface.'
  tags:
  - Appwrite
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APPWRITE_API_KEY: APPWRITE_API_KEY
capability:
  consumes:
  - type: http
    namespace: appwrite-users
    baseUri: https://cloud.appwrite.io/v1
    description: Appwrite API — Users business capability. Self-contained, no shared references.
    resources:
    - name: users
      path: /users
      operations:
      - name: listusers
        method: GET
        description: Appwrite - List Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: queries
          in: query
          type: array
          description: Array of query strings for filtering users
        - name: search
          in: query
          type: string
          description: Search term to filter users by name or email
      - name: createuser
        method: POST
        description: Appwrite - Create User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-Appwrite-Project
      value: '{{env.APPWRITE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: appwrite-users-rest
    port: 8080
    description: REST adapter for Appwrite API — Users. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: listusers
        description: Appwrite - List Users
        call: appwrite-users.listusers
        with:
          queries: rest.queries
          search: rest.search
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createuser
        description: Appwrite - Create User
        call: appwrite-users.createuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: appwrite-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Appwrite API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: appwrite-list-users
      description: Appwrite - List Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: appwrite-users.listusers
      with:
        queries: tools.queries
        search: tools.search
      outputParameters:
      - type: object
        mapping: $.
    - name: appwrite-create-user
      description: Appwrite - Create User
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: appwrite-users.createuser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
