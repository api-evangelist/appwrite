naftiko: 1.0.0-alpha2
info:
  label: Appwrite API — Databases
  description: 'Appwrite API — Databases. 1 operations. Lead operation: Appwrite - List Databases. Self-contained Naftiko
    capability covering one Appwrite business surface.'
  tags:
  - Appwrite
  - Databases
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APPWRITE_API_KEY: APPWRITE_API_KEY
capability:
  consumes:
  - type: http
    namespace: appwrite-databases
    baseUri: https://cloud.appwrite.io/v1
    description: Appwrite API — Databases business capability. Self-contained, no shared references.
    resources:
    - name: databases
      path: /databases
      operations:
      - name: listdatabases
        method: GET
        description: Appwrite - List Databases
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Appwrite-Project
      value: '{{env.APPWRITE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: appwrite-databases-rest
    port: 8080
    description: REST adapter for Appwrite API — Databases. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/databases
      name: databases
      description: REST surface for databases.
      operations:
      - method: GET
        name: listdatabases
        description: Appwrite - List Databases
        call: appwrite-databases.listdatabases
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: appwrite-databases-mcp
    port: 9090
    transport: http
    description: MCP adapter for Appwrite API — Databases. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: appwrite-list-databases
      description: Appwrite - List Databases
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: appwrite-databases.listdatabases
      outputParameters:
      - type: object
        mapping: $.
