  providerAccessTokenExpiry: String
  providerRefreshToken: String
}

type IdentityList {
  total: Int
  identities: [Identity]
}

type Log {
  event: String
  userId: String
  userEmail: String
  userName: String
  mode: String
  userType: String
  ip: String
  time: String
  osCode: String
  osName: String
  osVersion: String
  clientType: String
  clientCode: String
  clientName: String
  clientVersion: String
  clientEngine: String
  clientEngineVersion: String
  deviceName: String
  deviceBrand: String
  deviceModel: String
  countryCode: String
  countryName: String
}

type LogList {
  total: Int
  logs: [Log]
}

type Target {
  _id: String!
  _createdAt: String
  _updatedAt: String
  name: String
  userId: String
  providerId: String
