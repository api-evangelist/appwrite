# ──────────────────────────────────────────────
# Query Root
# All GET routes become Query fields.
# Naming: {namespace}{MethodNamePascalCase}
# ──────────────────────────────────────────────

type Query {
  # Account
  accountGet: Account
  accountGetPrefs: Preferences
  accountGetSession(sessionId: String!): Session
  accountListSessions: SessionList
  accountListLogs(queries: [String]): LogList
  accountListIdentities(queries: [String]): IdentityList
  accountGetMFARecoveryCodes: MFARecoveryCodes
  accountListMFAFactors: MFAFactors

  # Users (server-side admin)
  usersList(queries: [String], search: String): UserList
  usersGet(userId: String!): User
  usersGetPrefs(userId: String!): Preferences
  usersGetTarget(userId: String!, targetId: String!): Target
  usersListSessions(userId: String!): SessionList
  usersListMemberships(userId: String!): MembershipList
  usersListLogs(userId: String!, queries: [String]): LogList
  usersListTargets(userId: String!, queries: [String]): TargetList
  usersListIdentities(queries: [String], search: String): IdentityList

  # Teams
  teamsList(queries: [String], search: String): TeamList
  teamsGet(teamId: String!): Team
  teamsGetPrefs(teamId: String!): Preferences
  teamsListMemberships(teamId: String!, queries: [String], search: String): MembershipList
  teamsGetMembership(teamId: String!, membershipId: String!): Membership

  # Databases
  databasesList(queries: [String], search: String): DatabaseList
  databasesGet(databaseId: String!): Database
  databasesListCollections(databaseId: String!, queries: [String], search: String): CollectionList
  databasesGetCollection(databaseId: String!, collectionId: String!): Collection
  databasesListAttributes(databaseId: String!, collectionId: String!, queries: [String]): AttributeList
  databasesGetAttribute(databaseId: String!, collectionId: String!, key: String!): JSON
  databasesListIndexes(databaseId: String!, collectionId: String!, queries: [String]): IndexList
  databasesGetIndex(databaseId: String!, collectionId: String!, key: String!): Index
  databasesListDocuments(databaseId: String!, collectionId: String!, queries: [String]): DocumentList
  databasesGetDocument(databaseId: String!, collectionId: String!, documentId: String!, queries: [String]): Document

  # Storage
  storageListBuckets(queries: [String], search: String): BucketList
  storageGetBucket(bucketId: String!): Bucket
  storageListFiles(bucketId: String!, queries: [String], search: String): FileList
  storageGetFile(bucketId: String!, fileId: String!): File

  # Functions
  functionsList(queries: [String], search: String): FunctionList
  functionsGet(functionId: String!): Function
  functionsListDeployments(functionId: String!, queries: [String], search: String): DeploymentList
  functionsGetDeployment(functionId: String!, deploymentId: String!): Deployment
  functionsListExecutions(functionId: String!, queries: [String], search: String): ExecutionList
  functionsGetExecution(functionId: String!, executionId: String!): Execution
  functionsListVariables(functionId: String!): VariableList
  functionsGetVariable(functionId: String!, variableId: String!): Variable
  functionsListRuntimes: RuntimeList

  # Locale
  localeGet: Locale
  localeListCountries(queries: [String]): CountryList
  localeListCountriesEU(queries: [String]): CountryList
  localeListCountriesPhones: PhoneList
  localeListContinents(queries: [String]): ContinentList
  localeListCurrencies: CurrencyList
  localeListLanguages: LanguageList
  localeListCodes: LocaleCodeList
}

