  databasesCreate(databaseId: String!, name: String!, enabled: Boolean): Database
  databasesUpdate(databaseId: String!, name: String!, enabled: Boolean): Database
  databasesDelete(databaseId: String!): JSON
  databasesCreateCollection(databaseId: String!, collectionId: String!, name: String!, permissions: [String], documentSecurity: Boolean, enabled: Boolean): Collection
  databasesUpdateCollection(databaseId: String!, collectionId: String!, name: String!, enabled: Boolean, permissions: [String], documentSecurity: Boolean): Collection
  databasesDeleteCollection(databaseId: String!, collectionId: String!): JSON
  databasesCreateDocument(databaseId: String!, collectionId: String!, documentId: String!, data: Assoc!, permissions: [String]): Document
  databasesUpdateDocument(databaseId: String!, collectionId: String!, documentId: String!, data: Assoc, permissions: [String]): Document
  databasesUpsertDocument(databaseId: String!, collectionId: String!, documentId: String!, data: Assoc!, permissions: [String]): Document
  databasesDeleteDocument(databaseId: String!, collectionId: String!, documentId: String!): JSON
  databasesDeleteDocuments(databaseId: String!, collectionId: String!, queries: [String]): JSON
  databasesCreateStringAttribute(databaseId: String!, collectionId: String!, key: String!, size: Int!, required: Boolean!, default: String, array: Boolean, encrypt: Boolean): JSON
  databasesCreateEmailAttribute(databaseId: String!, collectionId: String!, key: String!, required: Boolean!, default: String, array: Boolean): JSON
  databasesCreateEnumAttribute(databaseId: String!, collectionId: String!, key: String!, elements: [String]!, required: Boolean!, default: String, array: Boolean): JSON
  databasesCreateIpAttribute(databaseId: String!, collectionId: String!, key: String!, required: Boolean!, default: String, array: Boolean): JSON
  databasesCreateUrlAttribute(databaseId: String!, collectionId: String!, key: String!, required: Boolean!, default: String, array: Boolean): JSON
  databasesCreateIntegerAttribute(databaseId: String!, collectionId: String!, key: String!, required: Boolean!, min: Int, max: Int, default: Int, array: Boolean): JSON
  databasesCreateFloatAttribute(databaseId: String!, collectionId: String!, key: String!, required: Boolean!, min: Float, max: Float, default: Float, array: Boolean): JSON
  databasesCreateBooleanAttribute(databaseId: String!, collectionId: String!, key: String!, required: Boolean!, default: Boolean, array: Boolean): JSON
  databasesCreateDatetimeAttribute(databaseId: String!, collectionId: String!, key: String!, required: Boolean!, default: String, array: Boolean): JSON
  databasesCreateRelationshipAttribute(databaseId: String!, collectionId: String!, relatedCollectionId: String!, type: String!, twoWay: Boolean, key: String, twoWayKey: String, onDelete: String): JSON
