  functionsCreate(functionId: String!, name: String!, runtime: String!, execute: [String], events: [String], schedule: String, timeout: Int, enabled: Boolean, logging: Boolean, entrypoint: String, commands: String, scopes: [String], installationId: String, providerRepositoryId: String, providerBranch: String, providerSilentMode: Boolean, providerRootDirectory: String, templateRepository: String, templateOwner: String, templateRootDirectory: String, templateVersion: String, specification: String): Function
