# Appwrite GraphQL Schema
#
# This schema is generated dynamically from Appwrite's REST routes.
# GET routes become Query fields; POST/PUT/PATCH/DELETE routes become Mutation fields.
# Field naming convention: {namespace}{MethodName} (e.g., accountGet, databasesList).
# Internal Appwrite model fields prefixed with $ (e.g., $id, $createdAt) are mapped
# to underscore-prefixed fields in GraphQL (e.g., _id, _createdAt).
#
# Source: https://github.com/appwrite/appwrite (src/Appwrite/GraphQL/)
# Docs:   https://appwrite.io/docs/apis/graphql
# Endpoint: https://{hostname}/v1/graphql

scalar JSON
scalar Assoc

# ──────────────────────────────────────────────
# Core Object Types
# ──────────────────────────────────────────────

type Account {
  _id: String!
  _createdAt: String
  _updatedAt: String
  name: String
  registration: String
  status: Boolean
  labels: [String]
  passwordUpdate: String
  email: String
  phone: String
  emailVerification: Boolean
  phoneVerification: Boolean
  mfa: Boolean
  prefs: Preferences
  targets: [Target]
  accessedAt: String
}

type Preferences {
  data: String
}

type Session {
  _id: String!
  _createdAt: String
  _updatedAt: String
  userId: String
  expire: String
  provider: String
  providerUid: String
  providerAccessToken: String
  providerAccessTokenExpiry: String
  providerRefreshToken: String
  ip: String
  osCode: String
  osName: String
  osVersion: String
  clientType: String
  clientCode: String
  clientName: String
  clientVersion: String
  clientEngine: String
  clientEngineVersion: String
  deviceName: String
  deviceBrand: String
  deviceModel: String
  countryCode: String
  countryName: String
  current: Boolean
  factors: [String]
  secret: String
  mfaUpdatedAt: String
}

type SessionList {
  total: Int
  sessions: [Session]
}

type Token {
  _id: String!
  _createdAt: String
  userId: String
  secret: String
  expire: String
  phrase: String
}

type JWT {
  jwt: String
}

type Identity {
