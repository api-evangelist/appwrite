  accountDeleteIdentity(identityId: String!): JSON
  accountUpdateMFA(mfa: Boolean!): Account
  accountCreateMFAAuthenticator(type: String!): MFAType
  accountUpdateMFAAuthenticator(type: String!, otp: String!): MFAType
  accountDeleteMFAAuthenticator(type: String!): JSON
  accountCreateMFAChallenge(factor: String!): MFAChallenge
  accountUpdateMFAChallenge(challengeId: String!, otp: String!): JSON
  accountCreateMFARecoveryCodes: MFARecoveryCodes
  accountUpdateMFARecoveryCodes: MFARecoveryCodes

  # Users (server-side admin)
  usersCreate(userId: String!, email: String, phone: String, password: String, name: String): User
  usersCreateBcryptUser(userId: String!, email: String, phone: String, password: String, name: String): User
  usersCreateMD5User(userId: String!, email: String, phone: String, password: String, name: String): User
  usersCreateArgon2User(userId: String!, email: String, phone: String, password: String, name: String): User
  usersCreateSHAUser(userId: String!, email: String, phone: String, password: String, name: String): User
  usersCreatePHPassUser(userId: String!, email: String, phone: String, password: String, name: String): User
  usersCreateScryptUser(userId: String!, email: String, phone: String, password: String, name: String): User
  usersCreateScryptModifiedUser(userId: String!, email: String, phone: String, password: String, name: String): User
  usersCreateTarget(userId: String!, targetId: String!, providerType: String!, identifier: String!, providerId: String, name: String): Target
  usersUpdateStatus(userId: String!, status: Boolean!): User
  usersUpdateLabels(userId: String!, labels: [String]!): User
  usersUpdateName(userId: String!, name: String!): User
  usersUpdatePassword(userId: String!, password: String!): User
  usersUpdateEmail(userId: String!, email: String!): User
  usersUpdatePhone(userId: String!, number: String!): User
  usersUpdateEmailVerification(userId: String!, emailVerification: Boolean!): User
  usersUpdatePhoneVerification(userId: String!, phoneVerification: Boolean!): User
  usersUpdatePrefs(userId: String!, prefs: Assoc!): Preferences
  usersUpdateTarget(userId: String!, targetId: String!, identifier: String, providerId: String, name: String): Target
  usersDeleteSession(userId: String!, sessionId: String!): JSON
  usersDeleteSessions(userId: String!): JSON
  usersDelete(userId: String!): JSON
  usersDeleteTarget(userId: String!, targetId: String!): JSON
  usersDeleteIdentity(userId: String!, identityId: String!): JSON

  # Teams
  teamsCreate(teamId: String!, name: String!, roles: [String]): Team
  teamsUpdateName(teamId: String!, name: String!): Team
  teamsUpdatePrefs(teamId: String!, prefs: Assoc!): Preferences
  teamsDelete(teamId: String!): JSON
  teamsCreateMembership(teamId: String!, roles: [String]!, email: String, userId: String, phone: String, url: String, name: String): Membership
  teamsUpdateMembership(teamId: String!, membershipId: String!, roles: [String]!): Membership
  teamsUpdateMembershipStatus(teamId: String!, membershipId: String!, userId: String!, secret: String!): Membership
  teamsDeleteMembership(teamId: String!, membershipId: String!): JSON

